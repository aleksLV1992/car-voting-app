services:
    # PHP Application
    app:
        build:
            context: ./local/php
            dockerfile: Dockerfile
        image: car-voting-app
        container_name: car-voting-app
        restart: unless-stopped
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:delegated
            - ./local/php/local.ini:/usr/local/etc/php/conf.d/local.ini
        networks:
            - car-voting-network
        depends_on:
            - mariadb
            - redis

    # Nginx Web Server
    nginx:
        image: nginx:alpine
        container_name: car-voting-nginx
        restart: unless-stopped
        ports:
            - "8081:80"
        volumes:
            - ./:/var/www/html:delegated
            - ./local/nginx/default.conf:/etc/nginx/conf.d/default.conf
        networks:
            - car-voting-network
        depends_on:
            - app

    # MariaDB Database
    mariadb:
        image: mariadb:latest
        container_name: car-voting-mariadb
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: root_secret
            MYSQL_USER: ${DB_USERNAME}
            MYSQL_PASSWORD: ${DB_PASSWORD}
        volumes:
            - mariadb_data:/var/lib/mysql
        networks:
            - car-voting-network

    # Redis
    redis:
        image: redis:alpine
        container_name: car-voting-redis
        restart: unless-stopped
        networks:
            - car-voting-network
        command: redis-server --bind 0.0.0.0

    # Node.js for Vue build
    node:
        image: node:20-alpine
        container_name: car-voting-node
        working_dir: /var/www/html
        volumes:
            - ./:/var/www/html:delegated
        networks:
            - car-voting-network
        environment:
            - NODE_TLS_REJECT_UNAUTHORIZED=0
        command: npm run build

networks:
    car-voting-network:
        driver: bridge

volumes:
    mariadb_data:
